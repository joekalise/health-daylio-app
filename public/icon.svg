<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#07070f"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="35%" stop-color="#818cf8" stop-opacity="1"/>
      <stop offset="70%" stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle inner highlight top-left -->
  <ellipse cx="160" cy="130" rx="160" ry="100" fill="#6366f1" fill-opacity="0.07"/>

  <!-- ECG / pulse line: flat → P wave → QRS complex → T wave → flat -->
  <path d="M 56,256
           L 152,256
           C 160,256 164,238 172,238 C 180,238 184,256 192,256
           L 210,256 L 218,274
           L 248,142
           L 268,326
           L 284,256
           L 300,256
           C 312,256 318,220 330,220 C 342,220 348,256 360,256
           L 456,256"
        stroke="url(#pulse)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"
        fill="none" filter="url(#glow)"/>
</svg>
